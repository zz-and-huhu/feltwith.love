on:
  push:
    paths-ignore:
      - "cache/**"
      - "public/images/**"
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v2
        with:
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
          fetch-depth: 0
      - name: Build
        run: |
          node --version
          npm i -g pnpm
          pnpm install
          pnpm build
          pnpm format
      - name: Commit files
        run: |
          git config --local user.email "zfhu16@gmail.com"
          git config --local user.name "ichn-hu"
          git status
          git add .
          git status
          # don't commit if no change
          git diff --quiet && git diff --staged --quiet || git commit -m 'Update with GitHub Action'
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
